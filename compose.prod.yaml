services:
  backend:
    container_name: unicoursefinder_backend
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - core_network
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_UNICOURSEFINDER_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_UNICOURSEFINDER_PASSWORD}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${ISSUER_URI}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=${JWK_SET_URI}
      - KEYCLOAK_SERVER_URL=${KEYCLOAK_SERVER_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_BACKEND_SERVICE_SECRET=${KEYCLOAK_BACKEND_SERVICE_SECRET}
    labels:
      - traefik.enable=true
      - traefik.docker.network=core_network
      # Path-based routing
      - traefik.http.routers.unicoursefinder-backend.rule=Host(`omeucurso.pt`) && PathPrefix(`/api`)
      - traefik.http.routers.unicoursefinder-backend.entrypoints=websecure
      - traefik.http.routers.unicoursefinder-backend.tls.certresolver=le
      - traefik.http.services.unicoursefinder-backend.loadbalancer.server.port=8080
      - traefik.http.routers.unicoursefinder-backend.middlewares=api-stripper
      - traefik.http.middlewares.api-stripper.stripprefix.prefixes=/api

  frontend:
    container_name: unicoursefinder_frontend
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    networks:
      - core_network
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.docker.network=core_network
      # Path-based routing
      - traefik.http.routers.unicoursefinder-frontend.rule=Host(`omeucurso.pt`)
      - traefik.http.routers.unicoursefinder-frontend.entrypoints=websecure
      - traefik.http.routers.unicoursefinder-frontend.tls.certresolver=le
      - traefik.http.services.unicoursefinder-frontend.loadbalancer.server.port=80
      # Redirect
      - traefik.http.middlewares.unicoursefinder-www-redirect.redirectregex.regex=^https://www.omeucurso.pt/(.*)
      - traefik.http.middlewares.unicoursefinder-www-redirect.redirectregex.replacement=https://omeucurso.pt/$${1}
      - traefik.http.middlewares.unicoursefinder-www-redirect.redirectregex.permanent=true
      # Router www
      - traefik.http.routers.unicoursefinder-www.rule=Host(`www.omeucurso.pt`)
      - traefik.http.routers.unicoursefinder-www.entrypoints=websecure
      - traefik.http.routers.unicoursefinder-www.tls.certresolver=le
      - traefik.http.routers.unicoursefinder-www.middlewares=unicoursefinder-www-redirect
      - traefik.http.routers.unicoursefinder-www.service=unicoursefinder-frontend

networks:
  core_network:
    external: true