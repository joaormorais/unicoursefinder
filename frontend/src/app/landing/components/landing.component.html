<div class="grid grid-cols-1 md:grid-cols-3 min-h-screen">
  <div
    class="column-container"
    routerLink="/search"
    [attr.aria-label]="'ariaLabels.search' | translate"
  >
    <div class="image-container">
      <img
        src="/assets/images/landing/search.jpg"
        alt="Search background"
        class="w-full h-full object-cover"
      />
    </div>
    <div class="overlay"></div>
    <div class="paragraph-container">
      <p class="landing-text">
        {{ "paragraphs.searchP" | translate }}
      </p>
      <i
        class="pi pi-arrow-right"
        style="font-size: 2.5rem; color: #ffffff"
        aria-hidden="false"
        [attr.aria-label]="'ariaLabels.nextIcon' | translate"
      ></i>
    </div>
  </div>

  <div
    class="column-container"
    routerLink="/forum"
    [attr.aria-label]="'ariaLabels.forum' | translate"
  >
    <div class="image-container">
      <img
        src="/assets/images/landing/forum.jpg"
        alt="Forum background"
        class="w-full h-full object-cover"
      />
    </div>
    <div class="overlay"></div>
    <div class="paragraph-container">
      <p class="landing-text">
        {{ "paragraphs.forumP" | translate }}
      </p>
      <i
        class="pi pi-arrow-right"
        style="font-size: 2.5rem; color: #ffffff"
        aria-hidden="false"
        [attr.aria-label]="'ariaLabels.nextIcon' | translate"
      ></i>
    </div>
  </div>

  <div
    class="column-container"
    routerLink="/help"
    [attr.aria-label]="'ariaLabels.help' | translate"
  >
    <div class="image-container">
      <img
        src="/assets/images/landing/help.jpg"
        alt="Help background"
        class="w-full h-full object-cover"
      />
    </div>
    <div class="overlay"></div>
    <div class="paragraph-container">
      <p class="landing-text">
        {{ "paragraphs.helpP" | translate }}
      </p>
      <i
        class="pi pi-arrow-right"
        style="font-size: 2.5rem; color: #ffffff"
        aria-hidden="false"
        [attr.aria-label]="'ariaLabels.nextIcon' | translate"
      ></i>
    </div>
  </div>
</div>
