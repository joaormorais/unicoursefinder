<h1 class="mt-3 mx-4 py-2 px-4 text-4xl">{{ post.title }}</h1>
<p-divider type="solid" />
<div class="card mx-4">
  <p-panel>
    <ng-template #header>
      <div class="flex items-center gap-2">
        <span class="font-bold">{{ post.author }}</span>
      </div>
    </ng-template>
    <ng-template #footer>
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-2">
          <p-button icon="pi pi-heart" rounded text></p-button>
          @if(post.ownedByCurrentUser){
          <p-button icon="pi pi-file-edit" severity="secondary" rounded text />
          }
        </div>
        @if(post.updatedAt){
        <span class="text-surface-500 dark:text-surface-400">
          {{ "panel.updatedAt" | translate }}
          {{ post.updatedAt | date : "dd/MM/yyyy HH:mm" }}
        </span>
        } @else{
        <span class="text-surface-500 dark:text-surface-400">
          {{ "panel.createdAt" | translate }}
          {{ post.createdAt | date : "dd/MM/yyyy HH:mm" }}</span
        >
        }
      </div>
    </ng-template>
    <p class="m-0">
      {{ post.content }}
    </p>
  </p-panel>
</div>
