<p-table
  #coursesTable
  [value]="searchService.courses()?.courses!"
  [lazy]="true"
  (onLazyLoad)="onLazyLoad($event)"
  [paginator]="true"
  [rows]="5"
  [first]="first()"
  [rowsPerPageOptions]="[5, 10, 25, 50]"
  [tableStyle]="{ width: '100%' }"
  dataKey="id"
  [loading]="
    searchService.loadingCourses() &&
    searchService.loadingTypesCourses()
  "
  [globalFilterFields]="['dgesNumber', 'name', 'type', 'institutionId']"
  sortField="name"
  [sortOrder]="1"
  rowHover="true"
>
</p-table>
