<div class="col-span-3 flex justify-start">
  <p-button
    icon="pi pi-home"
    class="mt-2 mr-2 mb-2 ml-4"
    [attr.aria-label]="'ariaLabels.landing' | translate"
    routerLink="/"
  />
</div>

<div class="col-span-6 flex justify-center items-center gap-4">
  <p-menu #menu [model]="items()" [popup]="true" />
  <p-button
    class="mt-2 mr-2 mb-2 ml-4 !inline md:!hidden"
    (click)="menu.toggle($event)"
    icon="pi pi-bars"
    aria-haspopup="true"
    [attr.aria-label]="'ariaLabels.menu' | translate"
  />

  <a
    routerLink="/search"
    routerLinkActive="active-link"
    class="header-routers"
    >{{ "buttons.search" | translate }}</a
  >
  <a
    routerLink="/forum"
    routerLinkActive="active-link"
    class="header-routers"
    >{{ "buttons.forum" | translate }}</a
  >
  <a routerLink="/help" routerLinkActive="active-link" class="header-routers">{{
    "buttons.help" | translate
  }}</a>
</div>

<div class="col-span-3 flex justify-end">
  <p-button
    icon="pi pi-sign-in"
    class="mt-2 mr-4 mb-2 ml-2"
    [attr.aria-label]="'ariaLabels.loginRegister' | translate"
    routerLink="/login"
  />
</div>
