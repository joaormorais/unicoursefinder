<div class="col-span-3 flex justify-start">
  <button
    mat-icon-button
    class="mt-2 mr-2 mb-2 ml-4"
    aria-label="Página principal"
    (click)="clearToggles()"
    routerLink="/"
  >
    <span class="flex items-center justify-center w-full h-full">
      <mat-icon>home</mat-icon>
    </span>
  </button>
</div>

<div class="col-span-6 flex justify-center items-center gap-4">
  <button
    mat-icon-button
    class="mt-2 mr-2 mb-2 ml-4 !inline md:!hidden"
    aria-label="Menu"
    [matMenuTriggerFor]="headerMenu"
  >
    <span class="flex items-center justify-center w-full h-full">
      <mat-icon>menu</mat-icon>
    </span>
  </button>
  <mat-menu #headerMenu>
    <button mat-menu-item routerLink="/search">
      {{ "buttons.searchSimple" | translate }}
    </button>
    <button mat-menu-item routerLink="/forum">
      {{ "buttons.forumSimple" | translate }}
    </button>
    <button mat-menu-item routerLink="/help">
      {{ "buttons.helpSimple" | translate }}
    </button>
  </mat-menu>

  <a
    routerLink="/search"
    routerLinkActive="active-link"
    class="header-routers"
    >{{ "buttons.searchSimple" | translate }}</a
  >
  <a
    routerLink="/forum"
    routerLinkActive="active-link"
    class="header-routers"
    >{{ "buttons.forumSimple" | translate }}</a
  >
  <a routerLink="/help" routerLinkActive="active-link" class="header-routers">{{
    "buttons.helpSimple" | translate
  }}</a>
</div>

<div class="col-span-3 flex justify-end">
  <button
    mat-icon-button
    class="mt-2 mr-4 mb-2 ml-2"
    aria-label="Iniciar sessão/Registo"
  >
    <span class="flex items-center justify-center w-full h-full">
      <mat-icon>login</mat-icon>
    </span>
  </button>
</div>
