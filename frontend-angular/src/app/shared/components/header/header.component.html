<div class="grid md:grid-cols-12 bg-white">
  <!-- <mat-menu> para o menu hamburger -->
  <div class="md:col-span-3 flex justify-start">
    <button
      mat-mini-fab
      class="mt-2 mr-2 mb-2 ml-4"
      aria-label="Página principal"
      (click)="clearToggles()"
      routerLink="/"
    >
      <mat-icon>home</mat-icon>
    </button>
  </div>

  <div class="md:col-span-6 flex justify-center items-center">
    <mat-button-toggle-group
      #headerToggleGroup
      aria-label="Navegação"
      [(value)]="selectedToggle"
    >
      <mat-button-toggle value="search" routerLink="/search">{{
        "buttons.searchSimple" | translate
      }}</mat-button-toggle>
      <mat-button-toggle value="forum" routerLink="/forum">{{
        "buttons.forumSimple" | translate
      }}</mat-button-toggle>
      <mat-button-toggle value="help" routerLink="/help">{{
        "buttons.helpSimple" | translate
      }}</mat-button-toggle>
    </mat-button-toggle-group>
  </div>

  <div class="md:col-span-3 flex justify-end">
    <button
      mat-mini-fab
      class="mt-2 mr-4 mb-2 ml-2"
      aria-label="Página principal"
    >
      <mat-icon>login</mat-icon>
    </button>
  </div>
</div>
