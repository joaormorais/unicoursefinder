<p-menubar [model]="items()">
  <ng-template #start>
    <p-button
      icon="pi pi-home"
      class="ml-4 mr-2"
      [attr.aria-label]="'ariaLabels.landing' | translate"
      routerLink="/"
    />
  </ng-template>
  <ng-template #end>
    <div class="flex items-center gap-2 ml-2 mr-4">
      <p-button
        [icon]="themeIcon()"
        class="ml-2"
        [attr.aria-label]="'ariaLabels.changeModes' | translate"
        (onClick)="toggleDarkMode()"
      />
      <p-button
        icon="pi pi-user"
        class="ml-2 mr-4"
        [attr.aria-label]="'ariaLabels.loginRegister' | translate"
        routerLink="/login"
      />
    </div>
  </ng-template>
</p-menubar>
