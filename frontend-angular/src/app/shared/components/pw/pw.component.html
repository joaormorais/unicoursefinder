<p-floatlabel class="w-full" variant="in"
  ><p-password
    id="password"
    [formControl]="passwordControl"
    [feedback]="false"
    [toggleMask]="true"
    [style]="{ width: '100%' }"
    inputStyleClass="w-full"
    (blur)="onTouched()"
  />
  <label for="password">{{ "auth.pw" | translate }}</label>
</p-floatlabel>
