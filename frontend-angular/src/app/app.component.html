<header class="h-[60px] w-full z-50 fixed top-0 left-0 right-0">
  <app-header class="header-container" />
</header>

<div class="flex min-h-screen flex-col pt-[60px]">
  <main class="flex flex-grow flex-col z-0">
    <router-outlet class="h-full" />
  </main>
  <p-dialog
    [modal]="true"
    [visible]="this.authService.dialogVisible()"
    [style]="{ width: '25rem' }"
    (visibleChange)="this.authService.hideDialog()"
    [header]="this.authService.dialogTitle()"
  >
    <app-login></app-login>
  </p-dialog>

  <footer class="h-[60px] w-full">
    <app-footer class="h-full" />
  </footer>
</div>
